<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>👻 恐怖隨機迷宮逃脫</title>
<style>
body { background: #000; color: white; text-align: center; font-family: sans-serif; padding-top: 20px; user-select: none; }
#level { font-size: 20px; color: #ff0055; font-weight: bold; margin-bottom: 5px; }
#game { margin: 20px auto; display: grid; grid-template-columns: repeat(8, 40px); width: 320px; border: 3px solid #444; background: #111; }
.c { width: 40px; height: 40px; border: 1px solid #222; box-sizing: border-box; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.wall { background: #2a2a2a; border: 1px solid #3a3a3a; }
.floor { background: #111; }
.p { background: #0055ff; box-shadow: inset 0 0 8px #00ffff; border-radius: 4px; }
.e { background: #00aa00; box-shadow: inset 0 0 8px #00ff00; }
.k { background: #ffcc00; box-shadow: inset 0 0 8px #ffff00; }
.m { background: #cc0000; box-shadow: inset 0 0 8px #ff0000; border-radius: 50%; }
.controls { margin: 20px auto; display: grid; grid-template-columns: repeat(3, 70px); grid-gap: 10px; width: 230px; justify-content: center; }
button { font-size: 22px; height: 55px; width: 70px; cursor: pointer; background: #222; color: white; border: 2px solid #555; border-radius: 8px; }
.up { grid-column: 2; }
.left { grid-column: 1; grid-row: 2; }
.down { grid-column: 2; grid-row: 2; }
.right { grid-column: 3; grid-row: 2; }
#msg { font-size: 18px; font-weight: bold; margin: 15px; min-height: 28px; color: #aaa; }
#restart-btn { font-size: 16px; padding: 8px 20px; background: #ff3333; border: none; border-radius: 5px; margin-top: 10px; font-weight: bold; cursor: pointer; display: none; color: white; }
</style>
</head>
<body>
<h2>👻 恐怖隨機迷宮逃脫</h2>
<div id="level">第 1 關</div>
<div id="game"></div>
<p id="msg">🔑 找到黃色鑰匙，前往綠色出口逃出去！</p>
<button id="restart-btn" onclick="retryLevel()">🔄 重試本關</button>
<div class="controls">
 <button class="up" onclick="move(0,-1)">⬆️</button>
 <button class="left" onclick="move(-1,0)">⬅️</button>
 <button class="down" onclick="move(0,1)">⬇️</button>
 <button class="right" onclick="move(1,0)">➡️</button>
</div>
<script>
let currentLevel = 1;
let map = [];
let px, py, mx, my, kx, ky, ex, ey;
let key, gameover;

// 隨機打亂陣列的函數
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

// 核心功能：動態生成全新隨機地圖
function generateRandomMap() {
  document.getElementById("level").innerHTML = "第 " + currentLevel + " 關";
  map = [];
  
  // 1. 先建立四周都是牆壁，內部全是空地的 8x8 基本地圖
  for(let y=0; y<8; y++) {
    let row = [];
    for(let x=0; x<8; x++) {
      if(y === 0 || y === 7 || x === 0 || x === 7) {
        row.push("#"); // 外牆
      } else {
        row.push("."); // 空地
      }
    }
    map.push(row);
  }

  // 2. 收集內部所有可以放東西的空地座標 (x: 1~6, y: 1~6)
  let emptyCells = [];
  for(let y=1; y<=6; y++) {
    for(let x=1; x<=6; x++) {
      emptyCells.push({x: x, y: y});
    }
  }

  // 隨機打亂這些空地位置
  shuffle(emptyCells);

  // 3. 從空地中依序抽出位置給玩家、鬼、鑰匙、出口
  let pPos = emptyCells.pop(); px = pPos.x; py = pPos.y; // 玩家
  let mPos = emptyCells.pop(); mx = mPos.x; my = mPos.y; // 鬼魂
  let kPos = emptyCells.pop(); kx = kPos.x; ky = kPos.y; // 鑰匙
  let ePos = emptyCells.pop(); ex = ePos.x; ey = ePos.y; // 出口

  // 4. 剩下空地隨機放一些內牆增加迷宮複雜度 (隨機放 8 個內牆)
  let wallCount = 8;
  for(let i=0; i<wallCount; i++) {
    if(emptyCells.length > 0) {
      let wPos = emptyCells.pop();
      map[wPos.y][wPos.x] = "#";
    }
  }

  // 重設遊戲狀態
  key = false;
  gameover = false;
  document.getElementById("msg").innerHTML = "🔑 找到黃色鑰匙，前往綠色出口逃出去！";
  document.getElementById("msg").style.color = "#aaa";
  document.getElementById("restart-btn").style.display = "none";
  draw();
}

// 被抓到後的「重試本關」
function retryLevel() {
  generateRandomMap();
}

function draw(){
 let g = document.getElementById("game"); g.innerHTML = "";
 for(let y=0; y<8; y++){
  for(let x=0; x<8; x++){
   let d = document.createElement("div"); d.className = "c ";
   if(map[y][x] == "#") d.className += "wall"; else d.className += "floor";
   if(x == px && y == py) d.className += " p";
   if(x == ex && y == ey) d.className += " e";
   if(x == kx && y == ky && !key) d.className += " k";
   if(x == mx && y == my) d.className += " m";
   g.appendChild(d);
  }
 }
}

function move(x,y){
 if(gameover) return; 
 let nx = px + x, ny = py + y; 
 if(map[ny][nx] == "#") return; 
 px = nx; py = ny;

 // 檢查是否拿到鑰匙
 if(px == kx && py == ky && !key){ 
  key = true; 
  document.getElementById("msg").innerHTML = "🔑 順利拿到鑰匙了！快前往綠色出口！"; 
  document.getElementById("msg").style.color = "#ffff00"; 
 }

 // 檢查是否成功逃脫
 if(px == ex && py == ey && key){ 
  currentLevel++; // 關卡數加 1
  document.getElementById("msg").innerHTML = "🎉 成功逃脫！即將載入第 " + currentLevel + " 關..."; 
  document.getElementById("msg").style.color = "#00ff00"; 
  gameover = true;
  draw();
  // 延遲 1.5 秒後自動生成全新的隨機地圖
  setTimeout(generateRandomMap, 1500);
  return; 
 }

 monster();

 // 檢查是否被鬼抓到
 if(px == mx && py == my){ 
  document.getElementById("msg").innerHTML = "💀 慘了！你被鬼抓到了！"; 
  document.getElementById("msg").style.color = "#ff3333"; 
  gameover = true; 
  endGame(); 
  return; 
 }
 draw();
}

function monster(){
 let dx = 0, dy = 0; if(mx < px) dx = 1; else if(mx > px) dx = -1; else if(my < py) dy = 1; else if(my > py) dy = -1;
 let nx = mx + dx, ny = my + dy; if(nx >= 0 && nx < 8 && ny >= 0 && ny < 8 && map[ny][nx] != "#"){ mx = nx; my = ny; }
}

function endGame() { 
 draw(); 
 document.getElementById("restart-btn").style.display = "inline-block"; 
}

document.addEventListener('keydown', function(event) {
 if(['ArrowUp', 'w', 'W'].includes(event.key)) { event.preventDefault(); move(0, -1); }
 if(['ArrowDown', 's', 'S'].includes(event.key)) { event.preventDefault(); move(0, 1); }
 if(['ArrowLeft', 'a', 'A'].includes(event.key)) { event.preventDefault(); move(-1, 0); }
 if(['ArrowRight', 'd', 'D'].includes(event.key)) { event.preventDefault(); move(1, 0); }
});

// 首次啟動隨機地圖
generateRandomMap();
</script>
</body>
</html>
