<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>👻 Horror Maze Online</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ===== 大廳 ===== -->

<div id="lobby">

<h1>👻 Horror Maze Online</h1>

<p>多人恐怖逃脫</p>

<input id="playerName"
placeholder="輸入你的名字"
maxlength="12">

<br><br>

<button id="createRoom">
建立房間
</button>

<button id="joinRoom">
加入房間
</button>

<br><br>

<input id="roomCode"
placeholder="房間代碼">

<div id="roomInfo"></div>

</div>

<!-- ===== 等待玩家 ===== -->

<div id="waiting" class="hidden">

<h2>等待其他玩家加入...</h2>

<h1 id="codeDisplay"></h1>

<div id="playerList"></div>

<button id="startGame">
開始遊戲
</button>

</div>

<!-- ===== HUD ===== -->

<div id="hud" class="hidden">

<div id="role">
角色：
</div>

<div id="keys">
鑰匙：0/5
</div>

<div id="staminaBox">

<div id="staminaBar"></div>

</div>

<div id="timer">

10:00

</div>

</div>

<!-- ===== 遊戲畫面 ===== -->

<div id="gameContainer" class="hidden">

<canvas id="gameCanvas"
width="720"
height="720"></canvas>

</div>

<!-- ===== 勝負畫面 ===== -->

<div id="result" class="hidden">

<h1 id="resultTitle"></h1>

<button id="playAgain">

再玩一次

</button>

</div>

<!-- ===== 手機控制 ===== -->

<div id="mobileControls" class="hidden">

<div id="joystick">

<div id="stick"></div>

</div>

<div id="buttons">

<button id="runBtn">

🏃

</button>

<button id="flashBtn">

🔦

</button>

<button id="actionBtn">

✋

</button>

</div>

</div>

<!-- ===== 音效 ===== -->

<audio
id="bgm"
loop></audio>

<audio id="footstep"></audio>

<audio id="heartbeat"></audio>

<audio id="ghostSound"></audio>

<!-- ===== 程式 ===== -->

<script src="maze.js"></script>

<script src="player.js"></script>

<script src="ghost.js"></script>

<script src="joystick.js"></script>

<script src="sound.js"></script>

<script src="network.js"></script>

<script src="game.js"></script>

</body>
</html>
